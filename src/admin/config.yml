backend:
  name: git-gateway
  branch: main

media_folder: "src/static/img"
public_folder: "src/static/img"

site_url: https://andy.bond

local_backend: true

editor:
  preview: false

collections:
  - label: "Posts"
    name: "posts"
    folder: "src/posts"
    create: true
    fields:
      [
        { label: "Draft", name: "draft", widget: "boolean", required: false },
        { label: "Title", name: "title", widget: "string" },
        { label: "Description", name: "description", widget: "string" },
        {
          label: "Date",
          name: "date",
          widget: "datetime",
          time_format: false,
          picker_utc: true,
          format: "YYYY-MM-DD",
          date_format: "MM/DD/YYYY",
        },
        {
          label: "Image",
          name: "image",
          widget: "image",
          choose_url: false,
          required: false,
        },
        {
          label: "Contains Code Blocks",
          name: "prism",
          widget: "boolean",
          required: false,
        },
        { label: "Body", name: "body", widget: "markdown", required: false },
        {
          label: "Category",
          name: "category",
          widget: "relation",
          collection: "categories",
          search_fields: ["posts.*.name"],
          value_field: "posts.*.name",
          default: "",
        },
      ]
  - label: "Photos"
    name: "photos"
    files:
      - label: "Gallery"
        name: "gallery"
        file: "src/_data/gallery.json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image" }
              - {
                  label: "Category",
                  name: "category",
                  widget: "relation",
                  collection: "categories",
                  search_fields: ["photos.*.name"],
                  value_field: "photos.*.name",
                }
              - {
                  label: "Size",
                  name: "size",
                  widget: "select",
                  options: ["auto", "tall", "wide", "both"],
                  default: ["auto"],
                }
              - {
                  label: "Date",
                  name: "date",
                  widget: "datetime",
                  time_format: false,
                  picker_utc: true,
                  format: "YYYY-MM-DD",
                  date_format: "MM/DD/YYYY",
                }
              - label: "Metadata"
                name: "metadata"
                widget: "object"
                required: false
                fields:
                  - {
                      label: "Camera",
                      name: "camera",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "F-Stop",
                      name: "fstop",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "Exposure Time",
                      name: "exposure",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "Focal Length",
                      name: "focalLength",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "ISO Speed",
                      name: "iso",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "Location",
                      name: "location",
                      widget: "string",
                      required: false,
                    }
  - label: "Book Reviews"
    name: "bookReviews"
    folder: "src/reviews/books"
    create: true
    fields:
      [
        { label: "Draft", name: "draft", widget: "boolean", required: false },
        { label: "Title", name: "title", widget: "string" },
        {
          label: "Author (book) / Artist (music) / Developer (game) / Location (restaurant)",
          name: "subtitle",
          widget: "string",
          required: false,
        },
        { label: "Series", name: "series", widget: "string", required: false },
        {
          label: "Series Index",
          name: "seriesIndex",
          widget: "number",
          value_type: "float",
          required: false,
        },
        {
          label: "Rating",
          name: "rating",
          widget: "number",
          value_type: "int",
          hint: "1 - Unbearable, 2 - Painful, 3 - Awful, 4 - Bad, 5 - Mediocre, 6 - Okay, 7 - Good, 8 - Great, 9 - Amazing, 10 - Masterpiece",
          min: 1,
          max: 10,
        },
        {
          label: "Date",
          name: "date",
          widget: "datetime",
          time_format: false,
          picker_utc: true,
          format: "YYYY-MM-DD",
          date_format: "MM/DD/YYYY",
        },
        {
          label: "External Link",
          name: "externalLink",
          widget: "string",
          required: false,
        },
        { label: "Image", name: "image", widget: "image", choose_url: false },
        { label: "Body", name: "body", widget: "markdown", required: false },

        {
          label: "Category",
          name: "category",
          widget: "relation",
          collection: "categories",
          search_fields: ["reviews.*.name"],
          value_field: "reviews.*.name",
          default: "book",
