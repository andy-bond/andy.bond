backend:
  name: git-gateway
  branch: main

media_folder: "src/static/img"
public_folder: "/static/img"

site_url: https://andy.bond
#logo_url: https://your-site.com/images/logo.svg

local_backend: true
publish_mode: editorial_workflow

editor:
  preview: false

collections:
  - label: "Posts"
    name: "posts"
    folder: "src/posts"
    path: '{{slug}}/index'
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
      - {
          label: "Tags",
          name: "tags",
          widget: select,
          multiple: true,
          options: ["life", "travel"],
        }
  - label: "Reviews"
    name: "reviews"
    folder: "src/reviews"
    path: '{{slug}}/index'
    create: true
    fields:
      - {
          label: "Type",
          name: "type",
          widget: select,
          options: ["movie", "tv", "book", "podcast", "music", "game", "restaurant"],
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author (book) / Artist (music) / Developer (game) / Location (restaurant)", name: "subtitle", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", choose_url: false  }
      - { label: "Favorite", name: "favorite", widget: "boolean" }
      - { label: "Series", name: "series", widget: "string", required: false }
      - { label: "External Link", name: "externalLink", widget: "string", required: false }
      - {
          label: "Rating",
          name: "rating",
          widget: "number",
          value_type: "int",
          min: 1,
          max: 5,
        }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Review", name: "body", widget: "markdown" }
  - label: "Settings"
    name: "settings"
    files:
      - label: "Navigation"
        name: "navigation"
        file: "src/_data/navigation.json"
        fields:
          - label: Nav Items
            name: items
            widget: list
            fields:
              - { label: Title, name: text, widget: string }
              - { label: URL, name: url, widget: string }
      - label: "Metadata"
        name: "metadata"
        file: "src/_data/metadata.json"
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Author, name: author, widget: string }
          - { label: URL, name: url, widget: string }
          - { label: Repository, name: repository, widget: string }
          - { label: Copyright Year, name: copyright, widget: number }
