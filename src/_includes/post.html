---
layout: default
---

{# Relations #}
{% set category = categories.posts | pick(category) %}

<div class="blogpost flex flex-col px-1 gap-2">
  <div class="breadcrumbs px-1 py-0.5 flex flex-row wrap align-items-center gap-1">
    <a href="/" class="flex flex-row align-items-center gap-0.5">
      {% icon 'home' %}
      Home
    </a>
    <div>/</div>
    <a href="/posts">Posts</a>
    <div>/</div>
    <div>{{title}}</div>
  </div>

  <article class="flex flex-col gap-2">
    <div class="flex flex-col gap-1">
      <h1>{{title}}</h1>
      <p class="subtitle">{{description}}</p>
    </div>
    <div class="blogpost-content flex flex-col gap-1">
      {{content | safe}}
    </div>
  </article>
</div>
