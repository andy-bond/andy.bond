---
layout: default
---

<div class="flex flex-col px-1">
  <div
    class="breadcrumbs px-1 py-0.5 flex flex-row wrap align-items-center gap-1 mb-2"
  >
    <a href="/" class="flex flex-row align-items-center gap-0.5">
      {% icon 'home' %}
    </a>
    {% if parent %}
    <div>/</div>
    <a href="{{parent.link}}"> {{parent.text}} </a>
    {% endif %}
    <div>/</div>
    <div>{{title}}</div>
  </div>
  <h1>{{title}}</h1>
  {{ content | safe }}
</div>
