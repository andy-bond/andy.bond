<nav class="tags mt-1">
  <ul>
    <li>
      <a class="tag" {% if page.url === '/reviews/' %} aria-current="page" {% endif %} href="/reviews">All Reviews</a>
    </li>
    {% for type in reviewTypes %}
      <li>
        <a class="tag" {% if type in page.url %} aria-current="page" {% endif %} href="/reviews/tags/{{type}}">
          {% reviewType type, 'tag' %}
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
