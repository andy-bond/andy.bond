<div id="lightbox" class="lightbox">
  <button id="lightbox-close">
    {% icon 'x' %}
  </button>
  <div id="lightbox-content">
    <div id="lightbox-image-area"></div>
    <div id="lightbox-caption"></div>
    <div id="lightbox-metadata">
      <div class="metadata-item flex flex-row align-items-center gap-0.5">
        {% icon 'camera' %}
        <div id="metadata-camera"></div>
      </div>
      <div class="metadata-item flex flex-row align-items-center gap-0.5">
        {% icon 'aperture' %}
        <div id="metadata-fstop"></div>
      </div>
      <div class="metadata-item flex flex-row align-items-center gap-0.5">
        {% icon 'timer' %}
        <div id="metadata-exposure"></div>
      </div>
      <div class="metadata-item flex flex-row align-items-center gap-0.5">
        <div id="metadata-focalLength"></div>
      </div>
      <div class="metadata-item flex flex-row align-items-center gap-0.5">
        <div id="metadata-iso"></div>
      </div>
      <div class="metadata-item flex flex-row align-items-center gap-0.5">
        {% icon 'map-pin' %}
        <div id="metadata-location"></div>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  const photoItems = document.getElementsByClassName('photo-item');
  for (let i = 0; i < photoItems.length; i++) {
    photoItems[i].addEventListener('click', openLightbox, false);
  }

  const closeLightboxButton = document.getElementById('lightbox-close');
  closeLightboxButton.addEventListener('click', closeLightbox, false);
</script>
