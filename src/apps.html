---
layout: listing
title: Applications
---

<section class="apps-list mt-2">
  {% asyncEach app in apps %}
  <a class="app-card card with-image" href="{{app.href}}" target="_blank">
    <div class="app-image">
      {% image app.image, "{{app.name}} Application" %}
    </div>
    <div class="app-information">
      <h2>{{ app.name }}</h2>
      <p class="app-description">
        {{ app.description }}
      </p>
    </div>
  </a>
  {% endeach %}
</section>
