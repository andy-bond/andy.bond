---
layout: contact
---

<div class="contact-form card flex flex-col">
  <h1>Contact</h1>
  <p>Use the form below to send me a message.</p>
  <form name="contact" class="flex flex-col" method="POST" data-netlify-recaptcha="true" data-netlify="true">
    <p class="contact-item flex flex-col gap-0.5">
      <label for="name">Name</label>
      <input type="text" name="name" required/>
    </p>
    <p class="contact-item flex flex-col gap-0.5">
      <label for="email">Email</label>
      <input type="email" name="email" requried/>
    </p>
    <p class="contact-item flex flex-col gap-0.5">
      <label for="message">Message</label>
      <textarea name="message" required></textarea>
    </p>
    <div data-netlify-recaptcha="true"></div>
    <p>
      <button type="submit">Submit</button>
    </p>
  </form>
</div>
