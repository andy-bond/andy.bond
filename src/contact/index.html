---
layout: default
title: Contact
---

<div class="contact-form flex flex-col mx-1 gap-1">
  <h1>{{title}}</h1>
  <p>Use the form below to send me a message.</p>
  <form name="contact" class="flex flex-col gap-1" method="POST" netlify-honeypot="bot-field" data-netlify="true" action="/contact/success">
    <p style="display: none" class="contact-item flex flex-col gap-0.5">
      <label for="bot-field">Name</label>
      <input type="text" name="bot-field" placeholder="Nice Try..."/>
    </p>
    <p class="contact-item flex flex-col gap-0.5">
      <label for="name">Name</label>
      <input type="text" name="name" placeholder="John Doe" required/>
    </p>
    <p class="contact-item flex flex-col gap-0.5">
      <label for="email">Email</label>
      <input type="email" name="email" placeholder="john.doe@gmail.com" required/>
    </p>
    <p class="contact-item flex flex-col gap-0.5">
      <label for="message">Message</label>
      <textarea name="message" placeholder="Wow, what a great website!" required></textarea>
    </p>
    <button type="submit">Submit</button>
  </form>
</div>
